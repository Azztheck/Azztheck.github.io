<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Écoles — Annuaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #111111;
      --border:   #1e1e1e;
      --cyan:     #3ECFCF;
      --cyan-dim: #2a9999;
      --text:     #e0e0e0;
      --muted:    #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── LOGIN ─────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    #login-screen h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 4px;
      color: var(--cyan);
    }

    #login-screen p {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .login-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 320px;
    }

    .login-box input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
    }

    .login-box input:focus { border-color: var(--cyan); }

    .login-box button {
      background: var(--cyan);
      border: none;
      border-radius: 4px;
      color: #000;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      padding: 12px;
      transition: background .2s;
    }

    .login-box button:hover { background: var(--cyan-dim); }

    #login-error {
      color: #e05555;
      font-size: 0.85rem;
      text-align: center;
      min-height: 18px;
    }

    /* ── APP ───────────────────────────────────────────── */
    #app { display: none; padding: 32px 24px; max-width: 1400px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--cyan);
    }

    .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: 1px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 14px;
      transition: all .2s;
      white-space: nowrap;
    }
    .nav-link:hover { border-color: var(--cyan); color: var(--cyan); }

    #logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      padding: 6px 14px;
      transition: all .2s;
    }
    #logout-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── FILTRES ───────────────────────────────────────── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .filters input,
    .filters select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color .2s;
    }

    .filters input:focus,
    .filters select:focus { border-color: var(--cyan); }

    .filters input { min-width: 220px; }

    .filters select option { background: #1a1a1a; }

    /* ── STATS ─────────────────────────────────────────── */
    #stats {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 12px;
      letter-spacing: .5px;
    }

    #stats span { color: var(--cyan); font-weight: 500; }

    /* ── TABLE ─────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #0f0f0f;
      border-bottom: 1px solid var(--border);
      color: var(--cyan);
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      padding: 12px 14px;
      text-align: left;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover { color: #fff; }
    thead th.asc::after  { content: ' ▲'; font-size: .65rem; }
    thead th.desc::after { content: ' ▼'; font-size: .65rem; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #131313; }

    tbody td {
      padding: 10px 14px;
      vertical-align: middle;
    }

    .badge {
      border-radius: 3px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      padding: 2px 7px;
    }

    .badge-mater { background: #1a3a3a; color: var(--cyan); }
    .badge-elem  { background: #2a1a3a; color: #b06ef0; }

    .badge-public { background: #1a2a1a; color: #6ec46e; }
    .badge-prive  { background: #2a1a1a; color: #e07070; }

    .mail-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mail-cell a {
      color: var(--cyan);
      text-decoration: none;
    }
    .mail-cell a:hover { text-decoration: underline; }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .copy-btn.copied { border-color: #6ec46e; color: #6ec46e; }

    .region-badge {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── PAGINATION ────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      padding: 6px 12px;
      transition: all .15s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
    .pagination button:disabled { opacity: .3; cursor: default; }
    .pagination button.active { background: var(--cyan); border-color: var(--cyan); color: #000; }

    #page-info { color: var(--muted); font-size: 0.85rem; }

    /* ── LOADING ───────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    @media (max-width: 700px) {
      #app { padding: 16px 12px; }
      .filters input { min-width: 100%; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <h1>Annuaire Écoles</h1>
  <p>Accès restreint</p>
  <div class="login-box">
    <input type="password" id="pwd-input" placeholder="Mot de passe" autocomplete="current-password" />
    <button id="login-btn">Accéder</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app">
  <header>
    <h1>Annuaire Écoles</h1>
    <a class="nav-link" href="carte.html">Carte →</a>
    <button id="logout-btn">Déconnexion</button>
  </header>

  <div class="filters">
    <input type="search" id="search" placeholder="Rechercher (nom, commune, mail…)" />
    <select id="filter-region">
      <option value="">Toutes les régions</option>
      <option value="aura">Auvergne-Rhône-Alpes</option>
      <option value="bfc">Bourgogne-Franche-Comté</option>
      <option value="bretagne">Bretagne</option>
      <option value="centre">Centre-Val de Loire</option>
      <option value="corse">Corse</option>
      <option value="grandest">Grand Est</option>
      <option value="guadeloupe">Guadeloupe</option>
      <option value="guyane">Guyane</option>
      <option value="hautsdefrance">Hauts-de-France</option>
      <option value="idf">Île-de-France</option>
      <option value="reunion">La Réunion</option>
      <option value="martinique">Martinique</option>
      <option value="mayotte">Mayotte</option>
      <option value="normandie">Normandie</option>
      <option value="nouvelleaquitaine">Nouvelle-Aquitaine</option>
      <option value="occitanie">Occitanie</option>
      <option value="pdl">Pays de la Loire</option>
      <option value="paca">Provence-Alpes-Côte d'Azur</option>
      <option value="tom">TOM et Collectivités territoriales</option>
    </select>
    <select id="filter-dept">
      <option value="">Tous les départements</option>
    </select>
    <select id="filter-type">
      <option value="">Mater + Elem</option>
      <option value="Mater">Maternelle</option>
      <option value="Elem">Élémentaire</option>
    </select>
    <select id="filter-statut">
      <option value="">Public + Privé</option>
      <option value="Public">Public</option>
      <option value="Privé">Privé</option>
    </select>
    <select id="per-page">
      <option value="50">50 / page</option>
      <option value="100">100 / page</option>
      <option value="200">200 / page</option>
    </select>
    <div style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:4px;padding:4px 10px;">
      <span style="color:var(--cyan);font-size:.8rem;letter-spacing:1px;white-space:nowrap">⭐ Rayon</span>
      <input type="number" id="filter-rayon" min="0" placeholder="km"
        style="width:64px;background:transparent;border:none;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.95rem;outline:none;" />
      <span style="color:var(--muted);font-size:.8rem">km</span>
      <button id="clear-rayon" title="Effacer"
        style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:0 2px;line-height:1;">✕</button>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
    <div id="stats"></div>
    <button id="copy-all-btn" style="display:none;background:var(--cyan);border:none;border-radius:4px;color:#000;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:1.5px;padding:5px 14px;transition:all .2s;">
      Copier tous les mails
    </button>
  </div>
  <div id="loading">Chargement des données…</div>

  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th data-col="commune">Commune</th>
          <th data-col="type_ecole">Type</th>
          <th data-col="mail">Mail</th>
          <th data-col="code_postal">CP</th>
          <th data-col="nom_etablissement">Établissement</th>
          <th data-col="departement">Département</th>
          <th data-col="adresse">Adresse</th>
          <th data-col="statut">Statut</th>
          <th data-col="_dist" id="th-dist" style="display:none">Distance</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
// ── HASH SHA-256 ────────────────────────────────────────
const PWD_HASH = 'b0b998b00ea0ee906658fbf6bf911c275470c76c813c04706510d457be3d799b';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── LOGIN ───────────────────────────────────────────────
const loginScreen = document.getElementById('login-screen');
const appEl       = document.getElementById('app');
const pwdInput    = document.getElementById('pwd-input');
const loginBtn    = document.getElementById('login-btn');
const loginError  = document.getElementById('login-error');

async function tryLogin() {
  const hash = await sha256(pwdInput.value);
  if (hash === PWD_HASH) {
    localStorage.setItem('auth', '1');
    loginScreen.style.display = 'none';
    appEl.style.display = 'block';
    initApp();
  } else {
    loginError.textContent = 'Mot de passe incorrect.';
    pwdInput.value = '';
    pwdInput.focus();
  }
}

loginBtn.addEventListener('click', tryLogin);
pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('auth');
  location.reload();
});

// Reprise de session — on attend que tout soit chargé
window.addEventListener('load', () => {
  if (localStorage.getItem('auth') === '1') {
    loginScreen.style.display = 'none';
    appEl.style.display = 'block';
    initApp();
  }
});

// ── CSV PARSER ──────────────────────────────────────────
function parseCSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const headers = parseLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = vals[idx] ?? ''; });
    rows.push(obj);
  }
  return rows;
}

function parseLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ';' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ── DATA ────────────────────────────────────────────────
const SOURCES = [
  { key: 'aura',            file: 'data/ecoles_aura.csv',                   label: 'Auvergne-Rhône-Alpes' },
  { key: 'bfc',             file: 'data/ecoles_bfc.csv',                    label: 'Bourgogne-Franche-Comté' },
  { key: 'bretagne',        file: 'data/ecoles_bretagne.csv',               label: 'Bretagne' },
  { key: 'centre',          file: 'data/ecoles_centre_val_de_loire.csv',    label: 'Centre-Val de Loire' },
  { key: 'corse',           file: 'data/ecoles_corse.csv',                  label: 'Corse' },
  { key: 'grandest',        file: 'data/ecoles_grand_est.csv',              label: 'Grand Est' },
  { key: 'guadeloupe',      file: 'data/ecoles_guadeloupe.csv',             label: 'Guadeloupe' },
  { key: 'guyane',          file: 'data/ecoles_guyane.csv',                 label: 'Guyane' },
  { key: 'hautsdefrance',   file: 'data/ecoles_hauts_de_france.csv',        label: 'Hauts-de-France' },
  { key: 'idf',             file: 'data/ecoles_ile_de_france.csv',          label: 'Île-de-France' },
  { key: 'reunion',         file: 'data/ecoles_la_reunion.csv',             label: 'La Réunion' },
  { key: 'martinique',      file: 'data/ecoles_martinique.csv',             label: 'Martinique' },
  { key: 'mayotte',         file: 'data/ecoles_mayotte.csv',                label: 'Mayotte' },
  { key: 'normandie',       file: 'data/ecoles_normandie.csv',              label: 'Normandie' },
  { key: 'nouvelleaquitaine', file: 'data/ecoles_nouvelle_aquitaine.csv',   label: 'Nouvelle-Aquitaine' },
  { key: 'occitanie',       file: 'data/ecoles_occitanie.csv',              label: 'Occitanie' },
  { key: 'pdl',             file: 'data/ecoles_pays_de_la_loire.csv',       label: 'Pays de la Loire' },
  { key: 'paca',            file: 'data/ecoles_paca.csv',                   label: "Provence-Alpes-Côte d'Azur" },
  { key: 'tom',             file: 'data/ecoles_tom.csv',                    label: 'TOM et Collectivités territoriales' },
];

// Coordonnées de Pommier-de-Beaurepaire
const ORIGIN = { lat: 45.40040530562972, lng: 5.1192795986267745 };

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

let allData = [];
let filtered = [];
let sortCol = 'commune', sortDir = 1;
let currentPage = 1;
let perPage = 50;

async function initApp() {
  const rows = await Promise.all(SOURCES.map(async s => {
    try {
      const res = await fetch(s.file, { cache: 'no-cache' });
      if (!res.ok) throw new Error(res.status);
      const text = await res.text();
      // Retire le BOM UTF-8 si présent
      const clean = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
      const data = parseCSV(clean);
      return data.map(r => ({ ...r, _region: s.key, _regionLabel: s.label }));
    } catch(e) {
      console.warn(`Impossible de charger ${s.file}:`, e);
      return [];
    }
  }));

  allData = rows.flat().map(r => {
    const lat = parseFloat(r.latitude);
    const lng = parseFloat(r.longitude);
    const dist = (!isNaN(lat) && !isNaN(lng))
      ? haversine(ORIGIN.lat, ORIGIN.lng, lat, lng)
      : null;
    return { ...r, _dist: dist };
  });
  document.getElementById('loading').style.display = 'none';
  document.getElementById('table-wrap').style.display = '';

  // Peuple le filtre départements
  const depts = [...new Set(allData.map(r => r.departement).filter(Boolean))].sort();
  const deptSel = document.getElementById('filter-dept');
  depts.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    deptSel.appendChild(o);
  });

  applyFilters();
  bindEvents();
}

// ── FILTRES & RENDU ─────────────────────────────────────
function applyFilters() {
  const search  = document.getElementById('search').value.toLowerCase().trim();
  const region  = document.getElementById('filter-region').value;
  const dept    = document.getElementById('filter-dept').value;
  const type    = document.getElementById('filter-type').value;
  const statut  = document.getElementById('filter-statut').value;
  const rayon   = parseFloat(document.getElementById('filter-rayon').value);
  const hasRayon = !isNaN(rayon) && rayon > 0;

  // Affiche/masque la colonne distance
  document.getElementById('th-dist').style.display = hasRayon ? '' : 'none';

  filtered = allData.filter(r => {
    if (region  && r._region     !== region)  return false;
    if (dept    && r.departement !== dept)     return false;
    if (type    && r.type_ecole  !== type)     return false;
    if (statut  && r.statut      !== statut)   return false;
    if (hasRayon && (r._dist === null || r._dist > rayon)) return false;
    if (search) {
      const hay = [r.nom_etablissement, r.commune, r.mail, r.departement, r.adresse].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Tri : si rayon actif, trie par distance par défaut
  if (hasRayon && sortCol === 'commune') {
    filtered.sort((a, b) => (a._dist ?? 999) - (b._dist ?? 999));
  } else {
    filtered.sort((a, b) => {
      if (sortCol === '_dist') return ((a._dist ?? 999) - (b._dist ?? 999)) * sortDir;
      const va = (a[sortCol] || '').toLowerCase();
      const vb = (b[sortCol] || '').toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }

  currentPage = 1;
  render();
}

function render() {
  perPage = parseInt(document.getElementById('per-page').value);
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage - 1) * perPage;
  const page  = filtered.slice(start, start + perPage);

  // Stats + bouton copie
  document.getElementById('stats').innerHTML =
    `<span>${total.toLocaleString('fr-FR')}</span> école${total > 1 ? 's' : ''} — page <span>${currentPage}</span>/<span>${totalPages}</span>`;

  const copyBtn = document.getElementById('copy-all-btn');
  copyBtn.style.display = total > 0 ? '' : 'none';
  copyBtn.textContent = `Copier ${total > 1 ? 'les ' + total.toLocaleString('fr-FR') + ' mails' : 'le mail'}`;

  // Lignes
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  page.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${esc(r.commune)}</td>
      <td><span class="badge ${r.type_ecole === 'Mater' ? 'badge-mater' : 'badge-elem'}">${esc(r.type_ecole)}</span></td>
      <td>
        <div class="mail-cell">
          <a href="mailto:${esc(r.mail)}">${esc(r.mail)}</a>
          <button class="copy-btn" data-mail="${esc(r.mail)}">Copier</button>
        </div>
      </td>
      <td>${esc(r.code_postal)}</td>
      <td>${esc(r.nom_etablissement)}</td>
      <td>${esc(r.departement)}</td>
      <td>${esc(r.adresse)}</td>
      <td><span class="badge ${r.statut === 'Public' ? 'badge-public' : 'badge-prive'}">${esc(r.statut)}</span></td>
      <td style="display:${document.getElementById('th-dist').style.display};color:var(--cyan);white-space:nowrap">
        ${r._dist !== null ? r._dist.toFixed(1) + ' km' : '—'}
      </td>
    `;
    tbody.appendChild(tr);
  });

  // En-têtes triées
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  });

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  el.innerHTML = '';

  const btn = (label, page, active = false, disabled = false) => {
    const b = document.createElement('button');
    b.textContent = label;
    if (active) b.classList.add('active');
    b.disabled = disabled;
    b.addEventListener('click', () => { currentPage = page; render(); window.scrollTo(0, 0); });
    return b;
  };

  el.appendChild(btn('←', currentPage - 1, false, currentPage === 1));

  // Pages visibles
  const delta = 2;
  const pages = new Set([1, totalPages]);
  for (let i = Math.max(1, currentPage - delta); i <= Math.min(totalPages, currentPage + delta); i++) pages.add(i);
  const sorted = [...pages].sort((a, b) => a - b);

  let prev = 0;
  sorted.forEach(p => {
    if (p - prev > 1) {
      const span = document.createElement('span');
      span.id = 'page-info'; span.textContent = '…';
      el.appendChild(span);
    }
    el.appendChild(btn(p, p, p === currentPage));
    prev = p;
  });

  el.appendChild(btn('→', currentPage + 1, false, currentPage === totalPages));
}

// ── EVENTS ──────────────────────────────────────────────
function bindEvents() {
  ['search', 'filter-region', 'filter-dept', 'filter-type', 'filter-statut', 'filter-rayon'].forEach(id => {
    document.getElementById(id).addEventListener('input', applyFilters);
  });

  document.getElementById('clear-rayon').addEventListener('click', () => {
    document.getElementById('filter-rayon').value = '';
    applyFilters();
  });

  document.getElementById('copy-all-btn').addEventListener('click', function() {
    const mails = filtered.map(r => r.mail).join(', ');
    navigator.clipboard.writeText(mails).then(() => {
      const orig = this.textContent;
      this.textContent = '✓ Copié !';
      this.style.background = '#6ec46e';
      setTimeout(() => {
        this.textContent = orig;
        this.style.background = 'var(--cyan)';
      }, 2000);
    });
  });

  document.getElementById('per-page').addEventListener('change', () => { currentPage = 1; render(); });

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) sortDir *= -1;
      else { sortCol = th.dataset.col; sortDir = 1; }
      applyFilters();
    });
  });

  document.getElementById('tbody').addEventListener('click', e => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    navigator.clipboard.writeText(btn.dataset.mail).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 1500);
    });
  });
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
